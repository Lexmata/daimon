# Bug and issue lifecycle
- name: bug
  color: "d73a4a"
  description: Something isn't working
- name: enhancement
  color: "a2eeef"
  description: New feature or improvement
- name: triage
  color: "e4e669"
  description: Needs triage and prioritization
- name: stale
  color: "ededed"
  description: Inactive for 60+ days
- name: pinned
  color: "006b75"
  description: Exempt from stale bot
- name: wontfix
  color: "ffffff"
