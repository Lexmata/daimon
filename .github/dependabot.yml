version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "build(deps)"
    groups:
      aws-sdk:
        patterns:
          - "aws-*"
      tokio:
        patterns:
          - "tokio*"
      serde:
        patterns:
          - "serde*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    open-pull-requests-limit: 5
    labels:
      - ci
      - automated
    commit-message:
      prefix: "ci(deps)"
