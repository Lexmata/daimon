name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]
  # Used by the autofix job to re-run CI on a fix commit it pushed: pushes
  # made with GITHUB_TOKEN never trigger workflows on their own.
  workflow_dispatch:

# Read-only token by default; the autofix job overrides with the write
# scopes it needs.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # ── Fast checks (no compilation) ──────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  commitlint:
    name: Commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-commitlint
        run: cargo install cargo-commitlint --locked
      - name: Lint commits
        run: |
          for sha in $(git log --no-merges --format=%H origin/${{ github.base_ref }}..HEAD); do
            git log -1 --format=%s "$sha" | cargo commitlint check --config commitlint.toml
          done

  # ── Compilation matrix ────────────────────────────────────────────
  check:
    name: Check (${{ matrix.toolchain }}, ${{ matrix.features }})
    runs-on: ubuntu-latest
    needs: [fmt]
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.95"]
        features:
          - "--no-default-features"
          - "--features openai"
          - "--features anthropic"
          - "--features bedrock"
          - "--features full"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.toolchain }}-${{ matrix.features }}
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo check ${{ matrix.features }}

  # ── Feature-flag isolation ────────────────────────────────────────
  # Compiles every feature of the root crate in isolation so a feature
  # that only builds when another happens to be enabled can't slip in.
  hack:
    name: Feature matrix (cargo hack)
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: hack
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - run: cargo hack check --each-feature --workspace

  # ── Linting ───────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Clippy (no default features)
        run: cargo clippy --workspace --no-default-features --all-targets -- -D warnings
      - name: Clippy (full features)
        run: cargo clippy --workspace --features full --all-targets -- -D warnings

  # ── Tests ─────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.features }})
    runs-on: ubuntu-latest
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        features:
          - "--no-default-features"
          - "--features full"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.features }}
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace ${{ matrix.features }} -- --nocapture

  # ── Coverage ──────────────────────────────────────────────────────
  coverage:
    name: Coverage (≥80%, full features)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # Full features so feature-gated code (mcp, http-server, distributed
      # backends, providers) is inside the gate; the previous 84% gate
      # measured --no-default-features only. Full-feature baseline: 81.2%.
      - name: Generate coverage
        run: cargo llvm-cov --features full --fail-under-lines 80 --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7

  # ── Examples ──────────────────────────────────────────────────────
  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: examples
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Check all examples
        run: cargo check --examples --features full

  # ── Documentation ─────────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [check]
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: docs
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo doc --workspace --features full --no-deps --document-private-items

  # ── Dependency audit ──────────────────────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans

  # ── Final gate ────────────────────────────────────────────────────
  # ── Lint autofix (PRs from this repo only) ────────────────────────
  # Applies machine-fixable clippy lints and rustfmt, pushes the fix
  # commit to the PR branch, and re-dispatches CI on it (GITHUB_TOKEN
  # pushes never trigger workflows by themselves). Strict gates still
  # run in the clippy/fmt jobs; this job only heals what it can.
  autofix:
    name: Lint autofix
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      # Third-party actions are SHA-pinned in this job (unlike the read-only
      # jobs) because it holds write permissions: a compromised action here
      # could push code or dispatch workflows.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: autofix
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Apply clippy fixes
        env:
          # Unset -Dwarnings so unfixable lints don't abort the fix pass;
          # the strict clippy job still gates them.
          RUSTFLAGS: ""
        run: cargo clippy --workspace --features full --all-targets --fix --allow-dirty
      - name: Apply formatting
        run: cargo fmt --all
      - name: Push fixes and re-dispatch CI
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet; then
            echo "No autofixable issues."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "style: apply automated clippy and rustfmt fixes"
          git push origin "HEAD:refs/heads/$HEAD_REF"
          gh workflow run ci.yml --ref "$HEAD_REF"
          echo "::notice::Autofix pushed $(git rev-parse --short HEAD) to $HEAD_REF; CI re-dispatched on the fixed commit."

  ci-pass:
    name: CI passed
    if: always()
    needs: [fmt, check, hack, clippy, test, coverage, examples, docs, deny]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          results=( \
            "${{ needs.fmt.result }}" \
            "${{ needs.check.result }}" \
            "${{ needs.hack.result }}" \
            "${{ needs.clippy.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.coverage.result }}" \
            "${{ needs.examples.result }}" \
            "${{ needs.docs.result }}" \
            "${{ needs.deny.result }}" \
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "::error::One or more CI jobs failed or were cancelled."
              exit 1
            fi
          done
          echo "All CI jobs passed."
