name: Security Audit

on:
  schedule:
    - cron: "0 8 * * 1"
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
  workflow_dispatch:

permissions:
  issues: write

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  license:
    name: License compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses
